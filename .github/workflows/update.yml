name: Update IPNova Dataset

on:
  schedule:
    - cron: "0 2 * * 1"    # Every Monday at 02:00 UTC
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write
  issues: write              # For failure notification

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2     # Need previous commit for diff

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint check
        run: |
          pip install ruff
          ruff check generate_ip_list.py

      - name: Snapshot previous counts
        id: prev_counts
        run: |
          if [ -f output/meta.json ]; then
            echo "prev_meta=$(cat output/meta.json | python3 -c 'import sys,json; m=json.load(sys.stdin); print(json.dumps(m.get("counts",{})))')" >> $GITHUB_OUTPUT
          else
            echo "prev_meta={}" >> $GITHUB_OUTPUT
          fi

      - name: Generate dataset
        run: python3 generate_ip_list.py
        timeout-minutes: 10

      - name: Generate diff report
        id: diff_report
        run: |
          python3 -c "
          import json, sys

          prev = json.loads('${{ steps.prev_counts.outputs.prev_meta }}' or '{}')
          with open('output/meta.json') as f:
              curr_meta = json.load(f)
          curr = curr_meta.get('counts', {})

          lines = []
          for cc in sorted(set(list(prev.keys()) + list(curr.keys()))):
              p = prev.get(cc, {})
              c = curr.get(cc, {})
              p_cidrs = p.get('cidrs', p) if isinstance(p, dict) else p
              c_cidrs = c.get('cidrs', c) if isinstance(c, dict) else c
              if isinstance(p_cidrs, int) and isinstance(c_cidrs, int):
                  diff = c_cidrs - p_cidrs
                  sign = '+' if diff > 0 else ''
                  lines.append(f'{cc}: {p_cidrs} -> {c_cidrs} ({sign}{diff})')

          report = '\n'.join(lines) if lines else 'First run or no previous data'
          print(report)

          with open('output/diff_report.txt', 'w') as f:
              f.write(report + '\n')
          "

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "chore: update dataset $(date -u '+%Y-%m-%d')"
            git push
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: update
    if: failure()

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Dataset update failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## IPNova automated update failed',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Possible causes:',
              '- APNIC upstream unavailable or returned abnormal data',
              '- RIPE Stat API failure rate exceeded 50%',
              '- Sanity check failed (CIDR counts below minimum thresholds)',
              '',
              'Please investigate the workflow logs and re-run manually if needed.',
            ].join('\n');

            // Check for existing open issue to avoid duplicates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 5,
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure'],
              });
            }
