name: Update IPNova Dataset

on:
  schedule:
    - cron: "0 2 * * 1"    # Every Monday at 02:00 UTC
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint check
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check generate_ip_list.py

      - name: Syntax check
        run: python -m py_compile generate_ip_list.py

      - name: Offline smoke test
        run: python tests/test_core_offline.py

      - name: Read current version
        id: version
        run: python3 scripts/read_version.py

      - name: Check if release already exists
        id: check_release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git tag | grep -q "^${TAG}$"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Snapshot previous counts
        id: prev_counts
        shell: bash
        run: |
          set -euo pipefail
          if [ -f output/meta.json ]; then
            prev_meta="$(python3 - <<'PY'
          import json
          with open('output/meta.json', 'r', encoding='utf-8') as f:
              meta = json.load(f)
          print(json.dumps(meta.get('counts', {}), separators=(',', ':')))
          PY
          )"
            echo "prev_meta=$prev_meta" >> "$GITHUB_OUTPUT"
          else
            echo 'prev_meta={}' >> "$GITHUB_OUTPUT"
          fi

      - name: Install format dependencies
        run: pip install -r requirements.txt

      - name: Generate dataset
        run: python3 generate_ip_list.py

      - name: Validate output
        id: validate
        run: python3 scripts/validate_output.py
        timeout-minutes: 21

      - name: Generate extended formats
        run: python3 scripts/build_formats.py

      - name: Record validation result
        run: echo "VALIDATION_STATUS=passed" >> $GITHUB_ENV

      - name: Generate diff report
        env:
          PREV_META: ${{ steps.prev_counts.outputs.prev_meta }}
        run: |
          python3 - <<'PY'
          import json
          import os

          prev = json.loads(os.environ.get('PREV_META', '{}') or '{}')

          with open('output/meta.json', 'r', encoding='utf-8') as f:
              curr_meta = json.load(f)

          curr = curr_meta.get('counts', {})

          lines = []
          for cc in sorted(set(prev) | set(curr)):
              p = prev.get(cc, {})
              c = curr.get(cc, {})

              p_cidrs = p.get('cidrs', 0) if isinstance(p, dict) else 0
              c_cidrs = c.get('cidrs', 0) if isinstance(c, dict) else 0
              diff = c_cidrs - p_cidrs
              sign = '+' if diff > 0 else ''

              lines.append(f'{cc}: {p_cidrs} -> {c_cidrs} ({sign}{diff})')

          report = '\n'.join(lines) if lines else 'First run or no previous data'
          print(report)

          # Write to a temp location (not committed to repo)
          os.makedirs('/tmp/ipnova', exist_ok=True)
          with open('/tmp/ipnova/diff_report.txt', 'w', encoding='utf-8') as f:
              f.write(report + '\n')
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove legacy files if present
          git rm -f output/.gitkeep 2>/dev/null || true
          git rm -f output/diff_report.txt 2>/dev/null || true

          git add output/

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            DIFF_SUMMARY=""
            if [ -f /tmp/ipnova/diff_report.txt ]; then
              DIFF_SUMMARY=$(cat /tmp/ipnova/diff_report.txt)
            fi
            git commit -m "chore: update dataset $(date -u '+%Y-%m-%d')" -m "$DIFF_SUMMARY"
            git push
          fi

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## IPNova ${{ steps.version.outputs.tag }}

            Automated dataset release.

            ### Dataset Coverage
            - Regions: CN / HK / TW / MO / JP / KR / SG
            - Source: APNIC delegated + BGP multi-source fusion

            ### Core Assets
            - `ipnova-apac.mmdb` — MaxMind-compatible APAC GeoIP database
            - `regions.json` — Structured all-region JSON dataset
            - `meta.json` — Dataset metadata and regional counts
            - `ipnova-formats.tar.gz` — TXT / JSON / Nginx / iptables compatibility bundle
            - `SHA256SUMS` — Integrity verification checksums

            ### Legacy Signature Assets
            Individual `CN.txt` / `HK.txt` / `TW.txt` / etc remain available as IPNova's signature regional rule sets.

            ### Usage (MMDB)
            Compatible with Clash, Surge, V2Ray, Xray, Nginx, and any MaxMind GeoIP2 tool.
            ```yaml
            # Clash example
            geoip:
              path: ipnova-apac.mmdb
            ```

            ### License
            CC BY-NC-SA 4.0 — Commercial use requires explicit written authorization.
            See [COMMERCIAL_LICENSE.md](./COMMERCIAL_LICENSE.md).
          files: |
            output/ipnova-apac.mmdb
            output/CN.txt
            output/HK.txt
            output/TW.txt
            output/MO.txt
            output/JP.txt
            output/KR.txt
            output/SG.txt
            output/regions.json
            output/data.json
            output/meta.json
            output/ipnova-formats.tar.gz
            output/SHA256SUMS
            output/json/*.json
            output/nginx/*.conf
            output/iptables/*.ipset

  notify-failure:
    runs-on: ubuntu-latest
    needs: update
    if: ${{ needs.update.result == 'failure' }}

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Dataset update failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## IPNova automated update failed',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Possible causes:',
              '- APNIC upstream unavailable or returned abnormal data',
              '- RIPE Stat API failure rate exceeded 50%',
              '- Sanity check failed (CIDR counts below minimum thresholds)',
              '- Lint check failed',
              '',
              'Please investigate the workflow logs and re-run manually if needed.',
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 5,
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            }
