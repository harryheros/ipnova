name: Update IPNova Dataset

on:
  schedule:
    - cron: "0 2 * * 1"    # Every Monday at 02:00 UTC
  workflow_dispatch:         # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint check
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check generate_ip_list.py

      - name: Snapshot previous counts
        id: prev_counts
        shell: bash
        run: |
          set -euo pipefail
          if [ -f output/meta.json ]; then
            prev_meta="$(python3 - <<'PY'
          import json
          with open('output/meta.json', 'r', encoding='utf-8') as f:
              meta = json.load(f)
          print(json.dumps(meta.get('counts', {}), separators=(',', ':')))
          PY
          )"
            echo "prev_meta=$prev_meta" >> "$GITHUB_OUTPUT"
          else
            echo 'prev_meta={}' >> "$GITHUB_OUTPUT"
          fi

      - name: Generate dataset
        run: python3 generate_ip_list.py

      - name: Validate output
        run: python3 scripts/validate_output.py
        timeout-minutes: 21

      - name: Generate diff report
        env:
          PREV_META: ${{ steps.prev_counts.outputs.prev_meta }}
        run: |
          python3 - <<'PY'
          import json
          import os

          prev = json.loads(os.environ.get('PREV_META', '{}') or '{}')

          with open('output/meta.json', 'r', encoding='utf-8') as f:
              curr_meta = json.load(f)

          curr = curr_meta.get('counts', {})

          lines = []
          for cc in sorted(set(prev) | set(curr)):
              p = prev.get(cc, {})
              c = curr.get(cc, {})

              p_cidrs = p.get('cidrs', 0) if isinstance(p, dict) else 0
              c_cidrs = c.get('cidrs', 0) if isinstance(c, dict) else 0
              diff = c_cidrs - p_cidrs
              sign = '+' if diff > 0 else ''

              lines.append(f'{cc}: {p_cidrs} -> {c_cidrs} ({sign}{diff})')

          report = '\n'.join(lines) if lines else 'First run or no previous data'
          print(report)

          # Write to a temp location (not committed to repo)
          os.makedirs('/tmp/ipnova', exist_ok=True)
          with open('/tmp/ipnova/diff_report.txt', 'w', encoding='utf-8') as f:
              f.write(report + '\n')
          PY

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove legacy files if present
          git rm -f output/.gitkeep 2>/dev/null || true
          git rm -f output/diff_report.txt 2>/dev/null || true

          git add output/

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            DIFF_SUMMARY=""
            if [ -f /tmp/ipnova/diff_report.txt ]; then
              DIFF_SUMMARY=$(cat /tmp/ipnova/diff_report.txt)
            fi
            git commit -m "chore: update dataset $(date -u '+%Y-%m-%d')" -m "$DIFF_SUMMARY"
            git push
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: update
    if: ${{ needs.update.result == 'failure' }}

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Dataset update failed — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## IPNova automated update failed',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Possible causes:',
              '- APNIC upstream unavailable or returned abnormal data',
              '- RIPE Stat API failure rate exceeded 50%',
              '- Sanity check failed (CIDR counts below minimum thresholds)',
              '- Lint check failed',
              '',
              'Please investigate the workflow logs and re-run manually if needed.',
            ].join('\n');

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 5,
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              });
            }
